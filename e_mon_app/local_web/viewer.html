<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Mall 3D Viewer</title>

  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #131313;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #131313;
    }

    .label {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div class="label">Local Mall 3D Model</div>

  <model-viewer
    src="./models/mall.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    tone-mapping="neutral"
    environment-image="neutral"
    interaction-prompt="auto">
  </model-viewer>
</body>
</html>
